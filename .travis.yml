dist: trusty
language: scala
scala:
- 2.11.11
jdk:
- oraclejdk8
before_script:
- npm install -g snyk@1.360.0
- snyk -v
- snyk auth $SNYK_TOKEN
script:
- sbt "project core" clean startDynamodbLocal test dynamodbLocalTestCleanup stopDynamodbLocal
- sbt "project transformer" clean startDynamodbLocal test dynamodbLocalTestCleanup stopDynamodbLocal
- sbt "project loader" clean startDynamodbLocal test dynamodbLocalTestCleanup stopDynamodbLocal
before_deploy:
- pip install --user release-manager==0.4.1
deploy:
  skip_cleanup: true
  provider: script
  script: "./.travis/deploy.sh $TRAVIS_TAG"
  on:
    tags: true
after_deploy:
- snyk monitor --project-name=snowplow-snowflake-loader
env:
  global:
  - secure: 
  - secure: 
  - secure: 
